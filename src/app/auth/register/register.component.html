<div class="auth-container">
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <h2>Register</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Email...">
      <div class="validation-message" *ngIf="email?.invalid && (email?.dirty || email?.touched)">
        <span *ngIf="email?.errors?.['required']">Email is required.</span>
        <span *ngIf="email?.errors?.['email']">Enter a valid email address.</span>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" placeholder="******">
      <div class="validation-message" *ngIf="password?.invalid && (password?.dirty || password?.touched)">
        <span *ngIf="password?.errors?.['required']">Password is required.</span>
        <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters.</span>
      </div>
    </div>
    <div class="form-group">
      <label>Repeat Password</label>
      <input type="password" formControlName="rePassword" placeholder="******">
      <div class="validation-message" *ngIf="registerForm.errors?.['mismatch'] && (rePassword?.dirty || rePassword?.touched)">
        <span>Passwords do not match.</span>
      </div>
    </div>
    <button type="submit" [disabled]="registerForm.invalid">Register</button>
    <p>Already have an account? <a routerLink="/login">Login here</a></p>
  </form>
</div>
