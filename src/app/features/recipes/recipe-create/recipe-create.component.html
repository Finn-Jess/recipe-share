<div class="auth-container">
  <form [formGroup]="recipeForm" (ngSubmit)="onSubmit()">
    <h2>Share a New Recipe</h2>

    <div class="form-group">
      <label>Recipe Title</label>
      <input type="text" formControlName="title" placeholder="Enter title...">
    </div>

    <div class="form-group">
      <label>Image URL</label>
      <input type="text" formControlName="imageUrl" placeholder="http://example.com/image.jpg">
    </div>

    <div class="form-group">
      <label>Description / Article</label>
      <textarea formControlName="description" rows="5" placeholder="Write your article here..."></textarea>
    </div>

    <div class="form-group">
      <label>Ingredients</label>
      <textarea formControlName="ingredients" rows="3" placeholder="Flour, eggs, milk..."></textarea>
    </div>

    <button type="submit" [disabled]="recipeForm.invalid">Create Recipe</button>
  </form>
</div>
