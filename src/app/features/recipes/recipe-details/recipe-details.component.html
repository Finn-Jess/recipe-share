<div *ngIf="isLoading" class="loading">Loading recipe...</div>

<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="recipe" class="recipe-details-container">
  <!-- Header Section -->
  <div class="recipe-header">
    <h1 class="recipe-title">{{ recipe.title || recipe.name }}</h1>
    <div class="recipe-meta">
      <span>🍳 Recipe</span>
      <span>⏱️ 30 min</span>
      <span>👥 4 servings</span>
    </div>
  </div>

  <!-- Hero Image -->
  <div class="recipe-image-wrapper" *ngIf="recipe.imageUrl || recipe.image">
    <img [src]="recipe.imageUrl || recipe.image" alt="Recipe image">
  </div>

  <!-- Content Grid -->
  <div class="recipe-content-grid">
    <!-- Ingredients Side -->
    <div class="ingredients-section">
      <h3>Ingredients</h3>
      <ul class="ingredient-list">
        <li class="ingredient-item" *ngFor="let ingredient of (recipe.ingredients || '').split(/[,\n]/)">
  {{ ingredient.trim() }}
</li>
      </ul>
    </div>

    <!-- Instructions Side -->
   <div class="description-section">
  <div class="description-text" *ngFor="let line of (recipe.instructions || recipe.steps || '').split('\n')">
    {{ line.trim() }}
  </div>
</div>
  

  <!-- Actions -->
  <div class="recipe-actions">
    <button class="btn btn-primary" routerLink="/catalog">Back to All Recipes</button>
    <button class="btn btn-outline">Share Recipe</button>
  </div>

  <div class="comments-section">
    <h3>Comments ({{ recipe.comments.length || 0 }})</h3>

    <div *ngIf="recipe.comments.length; else noComments">
      <div class="comment-item" *ngFor="let comment of recipe.comments">
        <div class="comment-user">{{ comment.username }}</div>
        <p class="comment-text">{{ comment.text }}</p>
      </div>
    </div>
    <ng-template #noComments>
      <p class="no-comments">No comments yet. Be the first to add one!</p>
    </ng-template>

    <div class="comment-form">
      <textarea
        [(ngModel)]="newCommentText"
        placeholder="Write your comment..."
        rows="3"
      ></textarea>
      <button class="btn btn-primary" type="button" (click)="addComment()" [disabled]="!newCommentText.trim()">
        Add Comment
      </button>
    </div>
  </div>
</div>
