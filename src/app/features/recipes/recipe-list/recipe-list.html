<div class="catalog-container">
  <div class="catalog-header">
    <h1>All Recipes & Articles</h1>
    <a *ngIf="authService.isLoggedIn" routerLink="/create" class="btn-create-more">Create Recipe</a>
  </div>

  <div *ngIf="recipes.length === 0" style="text-align: center; margin-top: 50px;">
    <p>
      No recipes found.
      <ng-container *ngIf="authService.isLoggedIn; else loginToCreate">
        Be the first to <a routerLink="/create">create one</a>!
      </ng-container>
      <ng-template #loginToCreate>
        <a routerLink="/login">Log in</a> to create one.
      </ng-template>
    </p>
  </div>

  <div class="recipe-grid">
    <div *ngFor="let r of recipes" class="recipe-card">
      <img [src]="r.imageUrl" alt="{{r.title}}">
      
      <div class="card-content">
        <h3>{{ r.title }}</h3>
        <p>{{ r.description | slice:0:100 }}{{ r.description.length > 100 ? '...' : '' }}</p>
      </div>

      <a [routerLink]="['/details', r._id]" class="btn-details">View Details</a>
    </div>
  </div>
</div>
